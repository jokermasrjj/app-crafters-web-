<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم GitHub - App Crafters</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 30px 20px;
        }
        
        header h1 {
            font-size: 2.8em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .input-section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            border-left: 5px solid #667eea;
        }
        
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card-stat {
            font-size: 2.8em;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        
        .card-label {
            color: #666;
            font-size: 0.95em;
        }
        
        .user-card {
            border-left-color: #764ba2;
            text-align: center;
        }
        
        .user-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 4px solid #667eea;
            display: block;
        }
        
        .user-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        
        .user-bio {
            color: #666;
            font-size: 0.95em;
            font-style: italic;
            margin: 10px 0;
        }
        
        .repos-list {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            grid-column: 1 / -1;
        }
        
        .repos-list h2 {
            color: #667eea;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .repos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        
        .repo-item {
            padding: 20px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            transition: all 0.3s;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            background-size: 200% 200%;
            background-position: 0% 0%;
        }
        
        .repo-item:hover {
            border-color: #667eea;
            background-position: 100% 100%;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        
        .repo-name {
            font-weight: 700;
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
            font-size: 1.1em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .repo-name:hover {
            text-decoration: underline;
        }
        
        .repo-desc {
            color: #666;
            font-size: 0.95em;
            margin: 10px 0;
            line-height: 1.5;
        }
        
        .repo-stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 0.9em;
            margin-top: 12px;
        }
        
        .stat-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: white;
            padding: 6px 12px;
            border-radius: 20px;
            color: #333;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .error {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .mini-stat {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        .mini-stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }
        
        .mini-stat-label {
            color: #666;
            font-size: 0.85em;
            margin-top: 5px;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }
            
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .repos-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 لوحة تحكم GitHub</h1>
            <p>عرض بيانات ملفك الشخصي والمشاريع من GitHub API</p>
        </header>
        
        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="username" 
                    placeholder="أدخل اسم مستخدم GitHub"
                    value="jokermasrjj"
                >
                <input 
                    type="password" 
                    id="token" 
                    placeholder="Personal Access Token (اختياري للطلبات الأكثر)"
                >
                <button onclick="loadDashboard()">⚡ تحميل</button>
            </div>
        </div>
        
        <div id="content">
            <!-- سيتم ملء المحتوى هنا -->
        </div>
    </div>

    <script>
        async function loadDashboard() {
            const username = document.getElementById('username').value.trim();
            const token = document.getElementById('token').value.trim();
            const content = document.getElementById('content');
            
            if (!username) {
                content.innerHTML = '<div class="error">⚠️ الرجاء إدخال اسم المستخدم</div>';
                return;
            }
            
            content.innerHTML = '<div class="loading"><div class="spinner"></div><p>جاري تحميل البيانات...</p></div>';
            
            try {
                const headers = {
                    'Accept': 'application/vnd.github.v3+json'
                };
                
                if (token) {
                    headers['Authorization'] = `token ${token}`;
                }
                
                // الحصول على بيانات المستخدم
                const userRes = await fetch(`https://api.github.com/users/${username}`, { headers });
                if (!userRes.ok) throw new Error('لم يتم العثور على المستخدم');
                const userData = await userRes.json();
                
                // الحصول على المستودعات
                const reposRes = await fetch(`https://api.github.com/users/${username}/repos?per_page=20&sort=updated&direction=desc`, { headers });
                const repos = await reposRes.json();
                
                // الحصول على الأنشطة الأخيرة
                const eventsRes = await fetch(`https://api.github.com/users/${username}/events?per_page=10`, { headers });
                const events = await eventsRes.json();
                
                // عرض البيانات
                let html = `
                    <div class="dashboard">
                        <div class="card user-card">
                            <img src="${userData.avatar_url}" alt="${username}" class="user-avatar">
                            <div class="user-name">${userData.name || username}</div>
                            <div class="user-bio">${userData.bio || 'بدون وصف'}</div>
                            <a href="${userData.html_url}" target="_blank" style="color: #667eea; text-decoration: none; font-weight: 600;">🔗 زيارة الملف الشخصي</a>
                            <div class="stats-row">
                                <div class="mini-stat">
                                    <div class="mini-stat-value">${userData.public_repos}</div>
                                    <div class="mini-stat-label">مستودع</div>
                                </div>
                                <div class="mini-stat">
                                    <div class="mini-stat-value">${userData.followers}</div>
                                    <div class="mini-stat-label">متابع</div>
                                </div>
                                <div class="mini-stat">
                                    <div class="mini-stat-value">${userData.following}</div>
                                    <div class="mini-stat-label">يتابع</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="card">
                            <h2>📦 المستودعات العامة</h2>
                            <div class="card-stat">${userData.public_repos}</div>
                            <div class="card-label">مستودع عام</div>
                        </div>
                        
                        <div class="card">
                            <h2>⭐ المتابعون</h2>
                            <div class="card-stat">${userData.followers}</div>
                            <div class="card-label">شخص يتابع ملفك</div>
                        </div>
                        
                        <div class="card">
                            <h2>👥 المتابعة</h2>
                            <div class="card-stat">${userData.following}</div>
                            <div class="card-label">شخص تتابعهم</div>
                        </div>
                        
                        <div class="card">
                            <h2>📍 الموقع</h2>
                            <div class="card-stat" style="font-size: 1.5em;">${userData.location || 'لا يوجد'}</div>
                            <div class="card-label">الموقع الجغرافي</div>
                        </div>
                        
                        <div class="card">
                            <h2>🔗 الرابط</h2>
                            <div style="word-break: break-all; color: #667eea; font-weight: 600; margin-top: 10px;">
                                ${userData.blog || 'لا يوجد'}
                            </div>
                            <div class="card-label">الموقع الشخصي</div>
                        </div>
                    </div>
                `;
                
                // قائمة المستودعات
                if (repos.length > 0) {
                    html += '<div class="repos-list"><h2>📂 المستودعات المحدثة مؤخراً</h2><div class="repos-grid">';
                    repos.forEach(repo => {
                        const langColor = getLanguageColor(repo.language);
                        html += `
                            <div class="repo-item">
                                <a href="${repo.html_url}" target="_blank" class="repo-name">
                                    🔗 ${repo.name}
                                </a>
                                <div class="repo-desc">${repo.description || 'بدون وصف'}</div>
                                <div class="repo-stats">
                                    <span class="stat-badge">⭐ ${repo.stargazers_count}</span>
                                    <span class="stat-badge">🍴 ${repo.forks_count}</span>
                                    <span class="stat-badge">👁️ ${repo.watchers_count}</span>
                                    ${repo.language ? `<span class="stat-badge" style="background: ${langColor}20; color: ${langColor};">💻 ${repo.language}</span>` : ''}
                                </div>
                            </div>
                        `;
                    });
                    html += '</div></div>';
                }
                
                content.innerHTML = html;
            } catch (error) {
                content.innerHTML = `<div class="error">❌ خطأ: ${error.message}</div>`;
            }
        }
        
        function getLanguageColor(language) {
            const colors = {
                'JavaScript': '#f1e05a',
                'Python': '#3572A5',
                'Java': '#b07219',
                'CSS': '#563d7c',
                'HTML': '#e34c26',
                'TypeScript': '#2b7489',
                'PHP': '#777bb4',
                'Ruby': '#cc342d',
                'Go': '#00add8',
                'Rust': '#ce422b',
                'Kotlin': '#F18E33',
                'C++': '#f34b7d'
            };
            return colors[language] || '#667eea';
        }
        
        // تحميل البيانات عند فتح الصفحة
        window.addEventListener('load', () => {
            const username = document.getElementById('username').value;
            if (username) {
                setTimeout(loadDashboard, 500);
            }
        });
    </script>
</body>
</html>
